<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Visor 3D</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

</head>

<body>

<div id="loading">
Cargando modelo...
</div>

<div id="hud">

<div id="title">Visor 3D</div>

<div id="panel">
Selecciona un objeto
</div>

</div>

<div id="labels"></div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(3,3,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

const light1 = new THREE.HemisphereLight(0xffffff, 0x334455, 1.2);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
light2.position.set(5, 10, 7);
scene.add(light2);

const light3 = new THREE.DirectionalLight(0xffffff, 0.5);
light3.position.set(-5, 3, -5);
scene.add(light3);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let objetos = [];
let labels = [];
let objetoSeleccionado = null;

const params = new URLSearchParams(window.location.search);
const objetoQR = params.get("objeto");

const loader = new GLTFLoader();

// Usamos fetch + parse para evitar el error DataCloneError con Workers
fetch("modelo.glb")
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.arrayBuffer();
  })
  .then(buffer => {
    loader.parse(buffer, "", (gltf) => {

      const model = gltf.scene;
      scene.add(model);

      // Centrar y escalar el modelo automáticamente
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 4 / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      // Ajustar cámara al tamaño del modelo
      camera.position.set(0, size.y * scale, maxDim * scale * 1.5);
      controls.target.set(0, 0, 0);
      controls.update();

      model.traverse((child) => {

        if (child.isMesh) {

          // El GLB tiene baseColorFactor negro — asignamos colores por nombre
      const coloresPorNombre = {
        'sphere': 0x4FC3F7,
        'teapot': 0xFF8A65,
        'box':    0x81C784,
      };
      let colorElegido = 0xCCCCCC;
      const nombreLower = child.name.toLowerCase();
      for (const [clave, color] of Object.entries(coloresPorNombre)) {
        if (nombreLower.includes(clave)) { colorElegido = color; break; }
      }
      child.material = new THREE.MeshStandardMaterial({
        color: colorElegido,
        metalness: 0.15,
        roughness: 0.55,
        transparent: true,
        opacity: 1.0,
      });

          objetos.push(child);
          crearLabel(child);

          if (objetoQR && child.name.toLowerCase().includes(objetoQR.toLowerCase())) {
            setTimeout(() => seleccionarObjeto(child), 100);
          }
        }

      });

      document.getElementById("loading").style.display = "none";

    }, (error) => {
      document.getElementById("loading").textContent = "Error al parsear el modelo GLB.";
      console.error("Error parseando GLB:", error);
    });
  })
  .catch(error => {
    document.getElementById("loading").textContent = "Error: no se encontró modelo.glb en esta carpeta.";
    console.error("Error cargando GLB:", error);
  });

function crearLabel(objeto){

const div = document.createElement("div");

div.className="label";
div.textContent=objeto.name || "Objeto";

document.getElementById("labels").appendChild(div);

labels.push({
objeto:objeto,
elemento:div
});

}

function actualizarLabels(){

labels.forEach(label=>{

const pos = new THREE.Vector3();
label.objeto.getWorldPosition(pos);

pos.project(camera);

const x=(pos.x*0.5+0.5)*window.innerWidth;
const y=(-pos.y*0.5+0.5)*window.innerHeight;

label.elemento.style.left=x+"px";
label.elemento.style.top=y+"px";

// Ocultar etiquetas detrás de la cámara
label.elemento.style.display = pos.z > 1 ? "none" : "block";

});

}

function seleccionarObjeto(objeto){

objetoSeleccionado = objeto;
actualizarApariencia();

const worldPos = new THREE.Vector3();
objeto.getWorldPosition(worldPos);
controls.target.copy(worldPos);

document.getElementById("panel").innerHTML="<b>Objeto:</b> "+(objeto.name||"sin nombre");

}

function actualizarApariencia(){
  objetos.forEach(o => {
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    const esSeleccionado = (o === objetoSeleccionado);
    mats.forEach(m => {
      m.transparent = true;
      m.opacity       = esSeleccionado ? 1.0 : 0.15;
      m.depthWrite    = esSeleccionado;
      if (m.emissive) m.emissive.set(esSeleccionado ? 0x111111 : 0x000000);
      m.needsUpdate   = true;
    });
  });
}

window.addEventListener("mousemove",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1;
mouse.y=-(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

const intersects=raycaster.intersectObjects(objetos);

// hover: solo resalta si no es el seleccionado
if(intersects.length>0){
  const obj=intersects[0].object;
  if(obj !== objetoSeleccionado){
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(m => { if(m.emissive) m.emissive.set(0x111111); });
  }
} else {
  // quitar hover de objetos no seleccionados
  objetos.forEach(o=>{
    if(o !== objetoSeleccionado){
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach(m => { if(m.emissive) m.emissive.set(0x000000); });
    }
  });
}

});

window.addEventListener("click",()=>{

raycaster.setFromCamera(mouse,camera);

const intersects=raycaster.intersectObjects(objetos);

if(intersects.length>0){
  seleccionarObjeto(intersects[0].object);
}

});

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

function animate(){

requestAnimationFrame(animate);

controls.update();

actualizarLabels();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
