<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Visor 3D</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>


<style>
/* ── Sidebar ── */
#sidebar {
  position: absolute;
  top: 0;
  right: -360px;
  width: 320px;
  height: 100%;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  color: white;
  display: flex;
  flex-direction: column;
  transition: right 0.4s cubic-bezier(0.22,1,0.36,1);
  z-index: 5;
  border-left: 1px solid rgba(255,255,255,0.08);
}
#sidebar.open { right: 0; }

#sidebar-topbar {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 14px 0;
  flex-shrink: 0;
}

#sidebar-toggle, #sidebar-close {
  background: rgba(255,255,255,0.08);
  border: none;
  color: white;
  font-size: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.3s;
  touch-action: manipulation;
  flex-shrink: 0;
}
#sidebar-toggle:hover,  #sidebar-toggle:active,
#sidebar-close:hover,   #sidebar-close:active  { background: rgba(255,255,255,0.22); }
#sidebar-toggle.collapsed { transform: rotate(180deg); }

#sidebar-content {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 12px 28px 32px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  transition: max-height 0.4s cubic-bezier(0.22,1,0.36,1),
              opacity    0.3s ease,
              padding    0.3s ease;
  max-height: 2000px;
  opacity: 1;
}
#sidebar-content.collapsed {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  overflow: hidden;
}


#sidebar-name {
  font-family: Arial, sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.02em;
}
#sidebar-badge {
  display: inline-block;
  margin: 0 auto;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}
#sidebar-desc {
  font-family: Arial, sans-serif;
  font-size: 0.9rem;
  line-height: 1.65;
  color: rgba(255,255,255,0.75);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 14px;
  margin-top: 4px;
}
#sidebar-props {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
  padding-bottom: 24px;
}
.prop-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  font-family: Arial, sans-serif;
  font-size: 0.82rem;
}
.prop-label { color: rgba(255,255,255,0.5); }
.prop-value  { font-weight: 600; color: white; }

/* ── HUD ── */
#hud { pointer-events: none; }
#hud * { pointer-events: auto; }

/* ── Mobile: sheet desde abajo ── */
@media (max-width: 600px) {
  #sidebar {
    top: auto;
    bottom: -100%;
    right: 0;
    left: 0;
    width: 100%;
    height: auto;
    max-height: 80vh;
    border-left: none;
    border-top: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px 20px 0 0;
    transition: bottom 0.4s cubic-bezier(0.22,1,0.36,1);
    flex-direction: column;
  }
  #sidebar.open  { bottom: 0; right: 0; }

  /* drag handle */
  #sidebar::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }

  #sidebar-topbar {
    padding: 20px 14px 0;
  }

  /* en móvil el toggle rota al revés (abre hacia arriba) */
  #sidebar-toggle         { transform: rotate(180deg); }
  #sidebar-toggle.collapsed { transform: rotate(0deg); }

  #sidebar-content {
    padding: 10px 20px 28px;
    max-height: 60vh;
  }
  #sidebar-content.collapsed {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  #sidebar-name  { font-size: 1.2rem; }
  #sidebar-desc  { font-size: 0.85rem; }
  .prop-row      { font-size: 0.78rem; }

  #title  { font-size: 15px !important; }
  #panel  { font-size: 12px !important; padding: 8px 12px !important; width: 160px !important; }
}

/* ── Tablet ── */
@media (min-width: 601px) and (max-width: 900px) {
  #sidebar       { width: 280px; right: -300px; }
  #sidebar.open  { right: 0; }
}
</style>
</head>

<body>

<div id="loading">
Cargando modelo...
</div>

<div id="hud">
<div id="title">Visor 3D</div>
<div id="panel">Selecciona un objeto</div>
</div>

<div id="labels"></div>

<!-- Panel lateral -->
<div id="sidebar">
  <div id="sidebar-topbar">
    <button id="sidebar-toggle" title="Colapsar / Expandir">▼</button>
    <button id="sidebar-close" title="Cerrar">✕</button>
  </div>
  <div id="sidebar-content">
    <h2 id="sidebar-name"></h2>
    <div id="sidebar-badge"></div>
    <p id="sidebar-desc"></p>
    <div id="sidebar-props"></div>
  </div>
</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(3,3,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

const light1 = new THREE.HemisphereLight(0xffffff, 0x334455, 1.2);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
light2.position.set(5, 10, 7);
scene.add(light2);

const light3 = new THREE.DirectionalLight(0xffffff, 0.5);
light3.position.set(-5, 3, -5);
scene.add(light3);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let objetos = [];
let labels = [];
let objetoSeleccionado = null;

const params = new URLSearchParams(window.location.search);
const objetoQR = params.get("objeto");

const loader = new GLTFLoader();

// Usamos fetch + parse para evitar el error DataCloneError con Workers
fetch("modelo.glb")
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.arrayBuffer();
  })
  .then(buffer => {
    loader.parse(buffer, "", (gltf) => {

      const model = gltf.scene;
      scene.add(model);

      // Centrar y escalar el modelo automáticamente
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 4 / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      // Ajustar cámara al tamaño del modelo
      camera.position.set(0, size.y * scale, maxDim * scale * 1.5);
      controls.target.set(0, 0, 0);
      controls.update();

      model.traverse((child) => {

        if (child.isMesh) {

          // El GLB tiene baseColorFactor negro — asignamos colores por nombre
      const coloresPorNombre = {
        'sphere': 0x4FC3F7,
        'teapot': 0xFF8A65,
        'box':    0x81C784,
      };
      let colorElegido = 0xCCCCCC;
      const nombreLower = child.name.toLowerCase();
      for (const [clave, color] of Object.entries(coloresPorNombre)) {
        if (nombreLower.includes(clave)) { colorElegido = color; break; }
      }
      child.material = new THREE.MeshStandardMaterial({
        color: colorElegido,
        metalness: 0.15,
        roughness: 0.55,
        transparent: true,
        opacity: 1.0,
      });

          objetos.push(child);
          crearLabel(child);

          if (objetoQR && child.name.toLowerCase().includes(objetoQR.toLowerCase())) {
            setTimeout(() => seleccionarObjeto(child), 100);
          }
        }

      });

      document.getElementById("loading").style.display = "none";

    }, (error) => {
      document.getElementById("loading").textContent = "Error al parsear el modelo GLB.";
      console.error("Error parseando GLB:", error);
    });
  })
  .catch(error => {
    document.getElementById("loading").textContent = "Error: no se encontró modelo.glb en esta carpeta.";
    console.error("Error cargando GLB:", error);
  });

function crearLabel(objeto){

const div = document.createElement("div");

div.className="label";
div.textContent=objeto.name || "Objeto";

document.getElementById("labels").appendChild(div);

labels.push({
objeto:objeto,
elemento:div
});

}

function actualizarLabels(){

labels.forEach(label=>{

const pos = new THREE.Vector3();
label.objeto.getWorldPosition(pos);

pos.project(camera);

const x=(pos.x*0.5+0.5)*window.innerWidth;
const y=(-pos.y*0.5+0.5)*window.innerHeight;

label.elemento.style.left=x+"px";
label.elemento.style.top=y+"px";

// Ocultar etiquetas detrás de la cámara
label.elemento.style.display = pos.z > 1 ? "none" : "block";

});

}


// ── Datos de cada objeto ──────────────────────────────────────────
const datosObjetos = {
  sphere: {
    icono: "🔵",
    nombre: "Esfera",
    color: "#4FC3F7",
    descripcion: "Una esfera perfecta que representa la simetría tridimensional. Cada punto de su superficie equidista exactamente del centro, lo que la convierte en una de las formas más fundamentales de la geometría.",
    propiedades: [
      { label: "Tipo",       value: "Sólido de revolución" },
      { label: "Caras",      value: "Infinitas (curva)" },
      { label: "Simetría",   value: "Total" },
      { label: "Mesh",       value: "Sphere001" },
    ]
  },
  teapot: {
    icono: "🟠",
    nombre: "Tetera",
    color: "#FF8A65",
    descripcion: "La icónica Utah Teapot, uno de los modelos 3D más famosos en la historia de los gráficos por computadora. Fue digitalizada por Martin Newell en 1975 y se convirtió en el modelo de prueba estándar de la industria.",
    propiedades: [
      { label: "Origen",     value: "Utah, 1975" },
      { label: "Autor",      value: "Martin Newell" },
      { label: "Tipo",       value: "Superficie NURBS" },
      { label: "Mesh",       value: "Teapot001" },
    ]
  },
  box: {
    icono: "🟢",
    nombre: "Caja",
    color: "#81C784",
    descripcion: "Un cubo o caja rectangular, el poliedro más básico y versátil del modelado 3D. Sus 6 caras, 12 aristas y 8 vértices lo convierten en el punto de partida de innumerables modelos en la industria.",
    propiedades: [
      { label: "Tipo",       value: "Hexaedro regular" },
      { label: "Caras",      value: "6" },
      { label: "Vértices",   value: "8" },
      { label: "Mesh",       value: "Box001" },
    ]
  },
};

const coloresClave = { sphere: "sphere", teapot: "teapot", box: "box" };

function obtenerClavePorNombre(nombre) {
  const n = nombre.toLowerCase();
  for (const clave of Object.keys(datosObjetos)) {
    if (n.includes(clave)) return clave;
  }
  return null;
}

function abrirSidebar(objeto) {
  const clave = obtenerClavePorNombre(objeto.name);
  const datos = clave ? datosObjetos[clave] : null;

  const sidebar  = document.getElementById("sidebar");
  const nameEl   = document.getElementById("sidebar-name");
  const badgeEl  = document.getElementById("sidebar-badge");
  const descEl   = document.getElementById("sidebar-desc");
  const propsEl  = document.getElementById("sidebar-props");

  if (datos) {
    nameEl.textContent  = datos.nombre;
    badgeEl.textContent = objeto.name;
    badgeEl.style.background = datos.color + "33";
    badgeEl.style.color       = datos.color;
    badgeEl.style.border      = `1px solid ${datos.color}55`;
    descEl.textContent  = datos.descripcion;
    propsEl.innerHTML   = datos.propiedades.map(p =>
      `<div class="prop-row">
        <span class="prop-label">${p.label}</span>
        <span class="prop-value">${p.value}</span>
       </div>`
    ).join("");
  } else {
    nameEl.textContent  = objeto.name || "Objeto";
    badgeEl.textContent = "";
    descEl.textContent  = "Sin descripción disponible.";
    propsEl.innerHTML   = "";
  }

  sidebar.classList.add("open");
}

// ── Toggle colapsar / expandir ──────────────────────────────────
document.getElementById("sidebar-toggle").addEventListener("click", () => {
  const content = document.getElementById("sidebar-content");
  const btn     = document.getElementById("sidebar-toggle");
  content.classList.toggle("collapsed");
  btn.classList.toggle("collapsed");
});

// ── Cerrar sidebar (sin deseleccionar objeto) ────────────────────
document.getElementById("sidebar-close").addEventListener("click", () => {
  document.getElementById("sidebar").classList.remove("open");
  // El objeto sigue seleccionado — solo se oculta el panel
});

// ── Función global para deseleccionar ────────────────────────────
function deseleccionar() {
  objetoSeleccionado = null;
  document.getElementById("sidebar").classList.remove("open");
  objetos.forEach(o => {
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach(m => {
      m.transparent = true;
      m.opacity     = 1.0;
      m.depthWrite  = true;
      if (m.emissive) m.emissive.set(0x000000);
      m.needsUpdate = true;
    });
  });
  document.getElementById("panel").textContent = "Selecciona un objeto";
}

function seleccionarObjeto(objeto){

objetoSeleccionado = objeto;
actualizarApariencia();

const worldPos = new THREE.Vector3();
objeto.getWorldPosition(worldPos);
controls.target.copy(worldPos);

document.getElementById("panel").innerHTML="<b>Objeto:</b> "+(objeto.name||"sin nombre");
abrirSidebar(objeto);

}

function actualizarApariencia(){
  objetos.forEach(o => {
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    const esSeleccionado = (o === objetoSeleccionado);
    mats.forEach(m => {
      m.transparent = true;
      m.opacity       = esSeleccionado ? 1.0 : 0.15;
      m.depthWrite    = esSeleccionado;
      if (m.emissive) m.emissive.set(esSeleccionado ? 0x111111 : 0x000000);
      m.needsUpdate   = true;
    });
  });
}

window.addEventListener("mousemove",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1;
mouse.y=-(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

const intersects=raycaster.intersectObjects(objetos);

// hover: solo resalta si no es el seleccionado
if(intersects.length>0){
  const obj=intersects[0].object;
  if(obj !== objetoSeleccionado){
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(m => { if(m.emissive) m.emissive.set(0x111111); });
  }
} else {
  // quitar hover de objetos no seleccionados
  objetos.forEach(o=>{
    if(o !== objetoSeleccionado){
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach(m => { if(m.emissive) m.emissive.set(0x000000); });
    }
  });
}

});

window.addEventListener("click", () => {

raycaster.setFromCamera(mouse, camera);
const intersects = raycaster.intersectObjects(objetos);

if (intersects.length > 0) {
  seleccionarObjeto(intersects[0].object);
} else {
  // Clic en espacio vacío → deseleccionar
  deseleccionar();
}

});

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

function animate(){

requestAnimationFrame(animate);

controls.update();

actualizarLabels();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
