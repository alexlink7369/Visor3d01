<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Códigos QR — Visor 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 40px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .instruccion {
    font-size: 0.85rem;
    color: #666;
    text-align: center;
    max-width: 460px;
  }

  .instruccion code {
    background: #ddd;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 220px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    border-top: 6px solid var(--color);
    page-break-inside: avoid;
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
  }

  .card-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #111;
    text-align: center;
  }

  .card-param {
    font-size: 0.72rem;
    color: #999;
    background: #f5f5f5;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: monospace;
  }

  .qr-box {
    padding: 8px;
    border: 2px solid #eee;
    border-radius: 10px;
  }

  .url-text {
    font-size: 0.65rem;
    color: #aaa;
    text-align: center;
    word-break: break-all;
    max-width: 190px;
  }

  .btn-print {
    background: #111;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .btn-print:hover { background: #333; }

  @media print {
    body { background: white; padding: 20px; }
    .btn-print, h1, .instruccion { display: none; }
    .cards { gap: 20px; }
    .card { box-shadow: none; border: 2px solid #ddd; border-top: 6px solid var(--color); }
  }
</style>
</head>
<body>

<h1>Códigos QR — Visor 3D</h1>

<p class="instruccion">
  Escanea cada QR con tu celular para abrir el visor con el objeto ya seleccionado.<br><br>
  ⚠️ Cambia la URL base en el script si tu servidor no es
  <code>http://localhost:8000</code>
</p>

<div class="cards">

  <div class="card" style="--color: #4FC3F7;">
    <div class="card-icon">🔵</div>
    <div class="card-name">Esfera</div>
    <div class="card-param">?objeto=sphere</div>
    <div class="qr-box" id="qr-sphere"></div>
    <div class="url-text" id="url-sphere"></div>
  </div>

  <div class="card" style="--color: #FF8A65;">
    <div class="card-icon">🟠</div>
    <div class="card-name">Tetera</div>
    <div class="card-param">?objeto=teapot</div>
    <div class="qr-box" id="qr-teapot"></div>
    <div class="url-text" id="url-teapot"></div>
  </div>

  <div class="card" style="--color: #81C784;">
    <div class="card-icon">🟢</div>
    <div class="card-name">Caja</div>
    <div class="card-param">?objeto=box</div>
    <div class="qr-box" id="qr-box"></div>
    <div class="url-text" id="url-box"></div>
  </div>

</div>

<button class="btn-print" onclick="window.print()">🖨️ Imprimir QR</button>

<script>
  // ⚠️ CAMBIA ESTA URL por la dirección donde está tu servidor
  // Si accedes desde otro dispositivo (celular), usa tu IP local, ej:
  // const BASE = "http://192.168.31.65:8000";
  const BASE = "http://192.168.31.65:8000";

  const objetos = [
    { id: "sphere", param: "sphere" },
    { id: "teapot", param: "teapot" },
    { id: "box",    param: "box"    },
  ];

  objetos.forEach(({ id, param }) => {
    const url = `${BASE}/index.html?objeto=${param}`;
    document.getElementById(`url-${id}`).textContent = url;
    new QRCode(document.getElementById(`qr-${id}`), {
      text: url,
      width: 160,
      height: 160,
      colorDark: "#111111",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M,
    });
  });
</script>

</body>
</html>
